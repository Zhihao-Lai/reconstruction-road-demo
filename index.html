<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高清道路重建图集</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f6f6f2;
      --panel: #ffffff;
      --ink: #191919;
      --muted: #676767;
      --line: #d7d7d0;
      --soft: #eeeeea;
      --accent: #0f766e;
      --dark: #101113;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header, main {
      max-width: 1500px;
      margin: 0 auto;
    }
    header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 300px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: right;
      min-width: 88px;
    }
    .stat strong {
      display: block;
      font-size: 19px;
      line-height: 1;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    main {
      padding: 22px 24px 52px;
    }
    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(310px, .55fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 22px;
    }
    .viewer-panel,
    .detail-panel,
    .case-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .viewer-panel {
      min-height: 560px;
      position: relative;
      background: var(--dark);
    }
    #viewerCanvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 560px;
      cursor: grab;
      touch-action: none;
    }
    #viewerCanvas:active { cursor: grabbing; }
    .viewer-overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
      pointer-events: none;
      color: #f6f6f2;
    }
    .viewer-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
      text-shadow: 0 1px 10px rgba(0,0,0,.55);
    }
    .viewer-hint {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.45;
      max-width: 270px;
      text-align: right;
      text-shadow: 0 1px 10px rgba(0,0,0,.55);
    }
    .viewer-status {
      position: absolute;
      left: 16px;
      bottom: 14px;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(0,0,0,.55);
    }
    .viewer-controls,
    .quality-controls {
      position: absolute;
      bottom: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .viewer-controls {
      right: 16px;
    }
    .quality-controls {
      left: 16px;
      bottom: 42px;
      justify-content: flex-start;
    }
    .viewer-controls button,
    .quality-controls button {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.1);
      color: #f6f6f2;
      border-radius: 8px;
      padding: 7px 10px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .viewer-controls button:hover,
    .viewer-controls button.active,
    .quality-controls button:hover,
    .quality-controls button.active {
      border-color: rgba(255,255,255,.55);
      background: rgba(255,255,255,.18);
    }
    .quality-controls button:disabled {
      opacity: .45;
      cursor: default;
    }
    .detail-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      gap: 10px;
    }
    figure {
      margin: 0;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }
    figure img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }
    .detail-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }
    .meta-row span {
      border: 1px solid var(--line);
      background: #fbfbf8;
      border-radius: 999px;
      padding: 5px 8px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin: 22px 0 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .case-card {
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: inherit;
      font: inherit;
      transition: border-color .16s ease, transform .16s ease;
    }
    .case-card:hover,
    .case-card.active {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .case-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #111214;
    }
    .case-body {
      padding: 11px 12px 13px;
    }
    .case-body h3 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .case-body p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    @media (max-width: 900px) {
      header {
        flex-direction: column;
        align-items: stretch;
        padding: 22px 14px 16px;
      }
      h1 { font-size: 25px; }
      .stats { justify-content: flex-start; min-width: 0; }
      .stat { text-align: left; }
      main { padding: 16px 14px 36px; }
      .stage { grid-template-columns: 1fr; }
      .viewer-panel,
      #viewerCanvas { min-height: 430px; }
      .viewer-overlay { flex-direction: column; align-items: stretch; }
      .viewer-hint { text-align: left; max-width: none; }
      .section-head { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>高清道路重建图集</h1>
      <p class="subtitle">完整分辨率航测照片，默认流畅点云；可切换细节和高清全量</p>
    </div>
  </header>
  <main>
    <section class="stage">
      <div class="viewer-panel">
        <canvas id="viewerCanvas"></canvas>
        <div class="viewer-overlay">
          <h2 class="viewer-title" id="viewerTitle">加载中</h2>
          <div class="viewer-hint">左键拖拽旋转 · 滚轮缩放</div>
        </div>
        <div class="viewer-status" id="viewerStatus">加载中</div>
        <div class="quality-controls" id="qualityControls">
          <button type="button" data-quality="smooth">流畅</button>
          <button type="button" data-quality="detail">细节</button>
          <button type="button" data-quality="full">高清</button>
        </div>
        <div class="viewer-controls" id="viewControls">
          <button type="button" data-view="turn-left">左转90°</button>
          <button type="button" data-view="turn-back">水平180°</button>
          <button type="button" data-view="turn-right">右转90°</button>
          <button type="button" data-view="angle">默认</button>
          <button type="button" data-view="top">俯视</button>
          <button type="button" data-view="reset">重置</button>
        </div>
      </div>
      <aside class="detail-panel">
        <h2 class="detail-title" id="detailTitle">加载中</h2>
        <div class="input-strip" id="inputStrip"></div>
        <div class="meta-row" id="detailMeta"></div>
      </aside>
    </section>
    <div class="section-head">
      <div>
        <h2>场景</h2>
      </div>
    </div>
    <section class="gallery" id="sceneGrid"></section>
  </main>
  <script src="viewerZoom.js?v=20260705-unlimitedzoom"></script>
  <script src="app.js?v=20260705-multi-lod"></script>
</body>
</html>
